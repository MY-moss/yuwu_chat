<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云雾酒馆 - 管理员大屏监控</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        :root {
            --bg-dark: #0a0a0f;
            --bg-panel: #1a1a24;
            --bg-card: #1a1a24;
            --bg-input: #12121a;
            --border: #2a2a3a;
            --text: #e0e0e0;
            --text-dim: #888;
            --text-bright: #f0f0f0;
            --gold: #d4a84b;
            --gold-dim: rgba(212,168,75,0.3);
            --accent: #c0392b;
            --success: #27ae60;
            --info: #3498db;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg-dark); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        .dashboard-header { background: linear-gradient(135deg, #1a1a24 0%, #0a0a0f 100%); padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .dashboard-title { font-size: 24px; font-weight: 700; color: var(--gold); display: flex; align-items: center; gap: 12px; }
        .dashboard-title .icon { font-size: 32px; }
        .refresh-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }
        .live-indicator { display: flex; align-items: center; gap: 8px; color: var(--success); font-size: 14px; }
        .live-dot { width: 10px; height: 10px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 20px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; text-align: center; position: relative; overflow: hidden; }
        .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
        .stat-card.online::before { background: var(--success); }
        .stat-card.calls::before { background: var(--gold); }
        .stat-card.tokens::before { background: var(--info); }
        .stat-card.sessions::before { background: #9b59b6; }
        .stat-card.users::before { background: #e67e22; }
        .stat-card.credits::before { background: #1abc9c; }
        .stat-value { font-size: 48px; font-weight: 900; margin: 10px 0; }
        .stat-card.online .stat-value { color: var(--success); }
        .stat-card.calls .stat-value { color: var(--gold); }
        .stat-card.tokens .stat-value { color: var(--info); }
        .stat-card.sessions .stat-value { color: #9b59b6; }
        .stat-card.users .stat-value { color: #e67e22; }
        .stat-card.credits .stat-value { color: #1abc9c; }
        .stat-label { font-size: 14px; color: var(--text-dim); }
        .section-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; grid-column: span 2; }
        .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--gold); display: flex; align-items: center; gap: 8px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(90,74,58,0.1); font-size: 14px; }
        .list-item:last-child { border-bottom: none; }
        .list-item .name { font-weight: 500; }
        .list-item .value { color: var(--text-dim); }
        .model-bar { height: 6px; background: rgba(90,74,58,0.2); border-radius: 3px; overflow: hidden; margin-top: 8px; }
        .model-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.5s; }
        .world-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .world-item { background: rgba(90,74,58,0.08); border-radius: 8px; padding: 12px; text-align: center; }
        .world-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
        .world-sessions { font-size: 11px; color: var(--text-dim); }
        .user-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin-left: 8px; }
        .user-badge.admin { background: rgba(192,57,43,0.2); color: var(--accent); }
        .user-badge.user { background: rgba(39,174,96,0.2); color: var(--success); }
        .time-ago { font-size: 11px; color: var(--text-dim); }
        .model-rank { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; }
        .model-name { font-size: 13px; font-weight: 500; }
        .model-stats { font-size: 12px; color: var(--text-dim); text-align: right; }
        .last-update { text-align: center; color: var(--text-dim); font-size: 12px; margin-top: 10px; }
        .logout-btn { background: rgba(192,57,43,0.1); border: 1px solid rgba(192,57,43,0.3); color: var(--accent); padding: 8px 16px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .logout-btn:hover { background: rgba(192,57,43,0.2); }
        @media (max-width: 1200px) {
            .dashboard-grid { grid-template-columns: repeat(3, 1fr); }
            .section-card { grid-column: span 3; }
        }
        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .stat-value { font-size: 36px; }
        }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <div class="dashboard-title">
            <span class="icon">📊</span>
            <span>云雾酒馆 - 管理员大屏监控</span>
        </div>
        <div style="display: flex; align-items: center; gap: 16px;">
            <div class="live-indicator">
                <span class="live-dot"></span>
                <span>实时监控中</span>
            </div>
            <button class="refresh-btn" id="dashRefreshBtn">🔄 刷新</button>
            <button class="logout-btn" id="dashLogoutBtn">🚪 退出</button>
        </div>
    </div>
    
    <div class="dashboard-grid" id="dashboardGrid">
        <div class="stat-card online">
            <div class="stat-value" id="onlineCount">0</div>
            <div class="stat-label">🟢 实时在线用户</div>
        </div>
        <div class="stat-card calls">
            <div class="stat-value" id="totalCalls">0</div>
            <div class="stat-label">📞 总调用次数</div>
        </div>
        <div class="stat-card tokens">
            <div class="stat-value" id="totalTokens">0</div>
            <div class="stat-label">⚡ 总Token消耗</div>
        </div>
        <div class="stat-card sessions">
            <div class="stat-value" id="activeSessions">0</div>
            <div class="stat-label">🎲 当前活跃跑团</div>
        </div>
        <div class="stat-card users">
            <div class="stat-value" id="totalUsers">0</div>
            <div class="stat-label">👥 注册用户总数</div>
        </div>
        <div class="stat-card credits">
            <div class="stat-value" id="totalCredits">0</div>
            <div class="stat-label">💰 系统总积分</div>
        </div>
        
        <div class="section-card">
            <div class="section-title">👥 在线用户列表</div>
            <div id="onlineUsersList">
                <div style="text-align: center; color: var(--text-dim); padding: 20px;">加载中...</div>
            </div>
        </div>
        
        <div class="section-card">
            <div class="section-title">🤖 模型使用排行</div>
            <div id="modelRanking">
                <div style="text-align: center; color: var(--text-dim); padding: 20px;">加载中...</div>
            </div>
        </div>
        
        <div class="section-card">
            <div class="section-title">🎲 当前活跃跑团</div>
            <div id="activeSessionsList">
                <div style="text-align: center; color: var(--text-dim); padding: 20px;">加载中...</div>
            </div>
        </div>
        
        <div class="section-card">
            <div class="section-title">📖 世界书使用统计</div>
            <div class="world-grid" id="worldStats">
                <div style="text-align: center; color: var(--text-dim); padding: 20px;">加载中...</div>
            </div>
        </div>
    </div>
    
    <!-- [AUDIT-N102] 内联脚本块约 160 行，如未来启用 CSP 则被阻止执行 -->
    <script type="module">
        import { animateCounter } from '/static/utils.js';
        window.animateCounter = animateCounter;
    </script>
    <script>
        function escapeHtml(s) {
            if (s == null) return '';
            return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
        }
        let refreshTimer = null;

        async function fetchStats() {
            try {
                const res = await fetch('/api/admin/stats', { credentials: 'include' });
                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }
                const data = await res.json();
                updateDashboard(data);
            } catch (e) {
                console.error('Fetch stats failed:', e);
            }
        }
        
        async function fetchUsers() {
            try {
                const res = await fetch('/api/admin/users', { credentials: 'include' });
                if (res.status === 401) {
                    window.location.href = '/';
                    return;
                }
                const data = await res.json();
                updateUserStats(data);
            } catch (e) {
                console.error('Fetch users failed:', e);
            }
        }
        
        function updateDashboard(stats) {
            animateCounter(document.getElementById('onlineCount'), stats.online_users || 0, { duration: 800 });
            animateCounter(document.getElementById('totalCalls'), stats.total_calls || 0, { duration: 1200 });
            animateCounter(document.getElementById('totalTokens'), stats.total_tokens || 0, { duration: 1500 });
            animateCounter(document.getElementById('activeSessions'), stats.active_sessions || 0, { duration: 800 });
            
            updateOnlineUsers(stats.online_users_list || []);
            updateModelRanking(stats.models || {});
            updateActiveSessions(stats.sessions_detail || []);
        }
        
        function updateUserStats(users) {
            const total = users.length || 0;
            const totalCredits = users.reduce((sum, u) => sum + (u.credits || 0), 0);
            animateCounter(document.getElementById('totalUsers'), total, { duration: 1200, useComma: true });
            animateCounter(document.getElementById('totalCredits'), totalCredits, { duration: 1500, useComma: true });
        }
        
        function updateOnlineUsers(list) {
            const container = document.getElementById('onlineUsersList');
            if (list.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 20px;">暂无在线用户</div>';
                return;
            }
            container.innerHTML = list.slice(0, 10).map(u => `
                <div class="list-item">
                    <span class="name">${escapeHtml(u.username)}<span class="user-badge ${u.role === 'admin' ? 'admin' : 'user'}">${u.role === 'admin' ? '管理员' : '用户'}</span></span>
                    <span class="time-ago">${formatTimeAgo(u.last_active)}</span>
                </div>
            `).join('');
        }
        
        function updateModelRanking(models) {
            const container = document.getElementById('modelRanking');
            const sorted = Object.entries(models).sort((a, b) => b[1].calls - a[1].calls);
            if (sorted.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 20px;">暂无模型使用数据</div>';
                return;
            }
            container.innerHTML = sorted.slice(0, 8).map(([name, data]) => `
                <div class="list-item" style="padding: 8px 0;">
                    <div>
                        <div class="model-name">${escapeHtml(name)}</div>
                        <div class="model-bar">
                            <div class="model-bar-fill" style="width: ${Math.min(100, (data.calls / sorted[0][1].calls) * 100)}%"></div>
                        </div>
                    </div>
                    <div class="model-stats">${escapeHtml(data.calls)}次 · ${escapeHtml(data.tokens)}Token</div>
                </div>
            `).join('');
        }
        
        function updateActiveSessions(list) {
            const container = document.getElementById('activeSessionsList');
            if (list.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 20px;">暂无活跃跑团</div>';
                return;
            }
            container.innerHTML = list.slice(0, 8).map(s => `
                <div class="list-item">
                    <span class="name">${escapeHtml(s.player)} · ${escapeHtml(s.world)}</span>
                    <span class="value">第${escapeHtml(s.rounds)}轮</span>
                </div>
            `).join('');
        }
        
        function updateWorldStats() {
            fetch('/api/rpg/worlds', { credentials: 'include' })
                .then(res => {
                    if (res.status === 401) { window.location.href = '/'; return; }
                    return res.json();
                })
                .then(worlds => {
                    const container = document.getElementById('worldStats');
                    if (!worlds || worlds.length === 0) {
                        container.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 20px;">暂无世界书数据</div>';
                        return;
                    }
                    container.innerHTML = worlds.map(w => `
                        <div class="world-item">
                            <div class="world-name">${escapeHtml(w.emoji)} ${escapeHtml(w.name)}</div>
                            <div class="world-sessions">评分: ${w.avg_rating || 0} ⭐</div>
                        </div>
                    `).join('');
                })
                .catch(e => console.error('Fetch worlds failed:', e));
        }
        
        function formatTimeAgo(isoString) {
            if (!isoString) return '未知';
            const d = new Date(isoString);
            const now = new Date();
            const diff = now - d;
            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff/60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff/3600000) + '小时前';
            return d.toLocaleDateString('zh-CN');
        }
        
        function refreshData() {
            fetchStats();
            fetchUsers();
            updateWorldStats();
        }
        
        function logout() {
            fetch('/api/auth/logout', { credentials: 'include' })
                .then(() => window.location.href = '/');
        }
        
        function cleanup() {
            if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
        }
        document.addEventListener('DOMContentLoaded', async () => {
            const preCheck = await fetch('/api/auth/me', { credentials: 'include' });
            if (preCheck.ok) {
                const me = await preCheck.json();
                if (me.role !== 'admin') { window.location.href = '/'; return; }
            } else { window.location.href = '/'; return; }
            refreshData();
            refreshTimer = setInterval(refreshData, 30000);
        });
        window.addEventListener('beforeunload', cleanup);
        window.addEventListener('pagehide', cleanup);
        document.getElementById('dashRefreshBtn').addEventListener('click', refreshData);
        document.getElementById('dashLogoutBtn').addEventListener('click', logout);
    </script>
</body>
</html>
